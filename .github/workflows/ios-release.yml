# PennyForge — iOS release via GitHub Actions + Fastlane (STAGED).
#
# SAFETY: this workflow is manual-only (workflow_dispatch) and tag-only
# (ios-v* tags, none of which exist yet). It NEVER runs on normal pushes or PRs,
# so it costs zero macOS minutes and cannot break the required `build-and-test`
# check. The first step also no-ops gracefully if the Capacitor iOS project has
# not been created yet (run `npm run ios:bootstrap` locally first).
#
# Activation checklist lives in docs/mobile-automation-stack.md. You must add the
# secrets referenced under `env:` (Settings → Secrets and variables → Actions)
# before a dispatched run can succeed.

name: iOS Release

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        default: "beta"
        type: choice
        options:
          - beta      # build + upload to TestFlight
          - release   # build + upload to App Store review
  push:
    tags:
      - "ios-v*"

# Least privilege: this workflow only reads the repo; releasing happens via the
# App Store Connect API key, not the GITHUB_TOKEN.
permissions:
  contents: read

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    # macOS runners are billed at a higher multiplier than Linux — this job only
    # ever runs when manually dispatched or an ios-v* tag is pushed.
    runs-on: macos-15
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      DEVELOPER_TEAM_ID: ${{ secrets.DEVELOPER_TEAM_ID }}
      FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      CAPACITOR_SERVER_URL: ${{ secrets.CAPACITOR_SERVER_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard — is the iOS project bootstrapped?
        id: guard
        run: |
          if [ ! -d "ios/App" ]; then
            echo "::warning::ios/App not found. Run 'npm run ios:bootstrap' and commit ios/ first."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        if: steps.guard.outputs.ready == 'true'
        run: npm ci

      - name: Build Next.js assets
        if: steps.guard.outputs.ready == 'true'
        run: npm run build

      - name: Sync Capacitor iOS project
        if: steps.guard.outputs.ready == 'true'
        run: npx cap sync ios

      - name: Install Ruby gems (CocoaPods, Fastlane — pinned by Gemfile)
        if: steps.guard.outputs.ready == 'true'
        working-directory: ios/App
        run: bundle install

      - name: Install CocoaPods dependencies
        if: steps.guard.outputs.ready == 'true'
        working-directory: ios/App
        run: bundle exec pod install

      - name: Run Fastlane (${{ github.event.inputs.lane || 'beta' }})
        if: steps.guard.outputs.ready == 'true'
        working-directory: ios/App
        run: bundle exec fastlane ${{ github.event.inputs.lane || 'beta' }}
